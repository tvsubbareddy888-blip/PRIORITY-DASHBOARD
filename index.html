<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>పని ప్రయారిటీ — Surya Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600;700&family=Teko:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1410;
    --bg-soft:#161d17;
    --panel:#1a221c;
    --panel-raised:#212b22;
    --line:#2b362b;
    --line-bright:#3a4a38;
    --amber:#f5a623;
    --amber-dim:#7a5a1f;
    --amber-glow:rgba(245,166,35,0.18);
    --green:#5fbf7a;
    --green-dim:#2e4d36;
    --red:#e2584f;
    --red-dim:#4d2e2c;
    --text:#e9ede7;
    --text-dim:#9fae9b;
    --text-faint:#6b7a68;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 50% 0%, rgba(245,166,35,0.05), transparent 60%);
    color:var(--text);
    font-family:'Hind',sans-serif;
    min-height:100vh;
    padding-bottom:64px;
  }
  /* scanline removed per user request */

  header{
    padding:18px 16px 14px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:40;
    background:rgba(15,20,16,0.92);
    backdrop-filter:blur(6px);
  }
  .brand{display:flex; align-items:baseline; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .header-icon-btn{
    background:transparent; border:1px solid var(--line-bright); color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:5px 9px; border-radius:7px;
    cursor:pointer; white-space:nowrap;
  }
  .header-icon-btn:active{transform:scale(0.95);}
  .brand-mark{
    font-family:'Teko',sans-serif; font-weight:600; font-size:26px; letter-spacing:0.5px;
    color:var(--amber); line-height:1;
  }
  .brand-mark span{color:var(--text-dim); font-size:13px; font-family:'JetBrains Mono',monospace; margin-left:8px; letter-spacing:0;}
  .signal{display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint);}
  .signal-dot{width:7px;height:7px;border-radius:50%;background:var(--green); box-shadow:0 0 8px var(--green);}
  .signal-dot.syncing{background:var(--amber); box-shadow:0 0 8px var(--amber); animation:pulse 1s ease-in-out infinite;}
  .signal-dot.offline{background:var(--red); box-shadow:0 0 8px var(--red);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  main{max-width:680px; margin:0 auto; padding:18px 14px;}

  /* HERO: next task */
  .hero{
    border:1px solid var(--amber-dim);
    background:linear-gradient(180deg, var(--amber-glow), transparent 70%), var(--panel-raised);
    border-radius:14px;
    padding:18px 16px 16px;
    margin-bottom:22px;
    position:relative;
    overflow:hidden;
  }
  .hero::before{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(45deg, transparent, transparent 18px, rgba(245,166,35,0.03) 18px, rgba(245,166,35,0.03) 19px);
    pointer-events:none;
  }
  .hero-label{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1.5px;
    color:var(--amber); text-transform:uppercase; margin-bottom:8px; display:block;
  }
  .hero-task{font-size:20px; font-weight:600; line-height:1.3; margin:0 0 6px;}
  .hero-meta{display:flex; gap:14px; flex-wrap:wrap; font-size:13px; color:var(--text-dim); margin-top:10px;}
  .hero-meta b{color:var(--text);}
  .hero-empty{color:var(--text-dim); font-size:15px;}

  /* Add task bar */
  .add-bar{
    display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;
  }
  .add-bar button{
    flex:1; min-width:140px;
    background:var(--panel-raised); border:1px solid var(--line-bright);
    color:var(--text); font-family:'Hind',sans-serif; font-weight:600; font-size:14px;
    padding:11px 14px; border-radius:8px; cursor:pointer;
  }
  .add-bar button.primary{background:var(--amber); color:#1a1408; border-color:var(--amber);}
  .add-bar button:active{transform:scale(0.98);}

  /* Filters */
  .filters{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.3px;
    padding:6px 11px; border-radius:20px; border:1px solid var(--line-bright);
    color:var(--text-dim); white-space:nowrap; cursor:pointer; background:transparent;
  }
  .chip.active{background:var(--amber); color:#1a1408; border-color:var(--amber); font-weight:600;}

  .sort-bar{display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .sort-bar-label{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint); letter-spacing:0.3px;}
  .sort-chip{
    font-family:'JetBrains Mono',monospace; font-size:11.5px;
    padding:6px 10px; border-radius:7px; border:1px solid var(--line-bright);
    color:var(--text-dim); white-space:nowrap; cursor:pointer; background:var(--panel);
    display:flex; align-items:center; gap:4px;
  }
  .sort-chip.active{border-color:var(--amber); color:var(--amber); background:rgba(245,166,35,0.08);}

  .task-serial{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-faint);
    flex-shrink:0; width:22px; text-align:right; padding-top:2px;
  }

  /* Resource group */
  .resource-group{margin-bottom:22px;}
  .resource-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 2px; cursor:pointer; user-select:none;
  }
  .resource-name{
    font-family:'Teko',sans-serif; font-weight:600; font-size:19px; letter-spacing:0.3px;
    color:var(--text); display:flex; align-items:center; gap:8px;
  }
  .resource-dot{width:8px;height:8px;border-radius:2px; flex-shrink:0;}
  .resource-count{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-faint);}
  .resource-sum{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--green);}

  .task-list{display:flex; flex-direction:column; gap:8px;}
  .task-card{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:12px 13px; display:flex; gap:11px; align-items:flex-start;
  }
  .task-card.done{opacity:0.45;}
  .task-card.done .task-title{text-decoration:line-through;}
  .priority-bar{width:4px; border-radius:3px; flex-shrink:0; align-self:stretch; min-height:36px;}
  .pbar-high{background:var(--amber); box-shadow:0 0 6px var(--amber-glow);}
  .pbar-med{background:#6b8a55;}
  .pbar-low{background:var(--line-bright);}
  .task-body{flex:1; min-width:0;}
  .task-title{font-size:15px; font-weight:500; margin:0 0 4px; line-height:1.35; word-break:break-word;}
  .task-tags{display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:12px; color:var(--text-dim);}
  .tag{
    font-family:'JetBrains Mono',monospace; font-size:11px;
    padding:2px 7px; border-radius:5px; border:1px solid var(--line-bright);
    display:inline-flex; align-items:center; gap:4px;
  }
  .tag.rev{color:var(--green); border-color:var(--green-dim);}
  .tag.who{color:var(--text-dim);}
  .tag.status-pending{color:var(--text-faint);}
  .tag.status-progress{color:var(--amber); border-color:var(--amber-dim);}
  .tag.status-done{color:var(--green); border-color:var(--green-dim);}
  .task-actions{display:flex; flex-direction:column; gap:6px; flex-shrink:0;}
  .icon-btn{
    background:none; border:1px solid var(--line-bright); color:var(--text-dim);
    width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:active{transform:scale(0.92);}
  .empty-state{
    text-align:center; padding:50px 20px; color:var(--text-faint);
  }
  .empty-state .big{font-size:38px; margin-bottom:10px;}

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:rgba(8,11,8,0.7); z-index:100;
    display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--bg-soft); border:1px solid var(--line); border-bottom:none;
    border-radius:16px 16px 0 0; width:100%; max-width:680px;
    padding:18px 16px 26px; max-height:88vh; overflow-y:auto;
  }
  .sheet h3{font-family:'Teko',sans-serif; font-size:22px; font-weight:600; margin:0 0 14px; color:var(--amber);}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; font-family:'JetBrains Mono',monospace; letter-spacing:0.3px;}
  .field label.checkbox-label{display:flex; align-items:flex-start; gap:6px; font-size:13.5px; font-family:'Hind',sans-serif; color:var(--text); line-height:1.4;}
  .field label.checkbox-label input{width:auto; margin-top:3px;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--panel); border:1px solid var(--line-bright); color:var(--text);
    padding:10px 11px; border-radius:8px; font-size:15px; font-family:'Hind',sans-serif;
  }
  .field textarea{resize:vertical; min-height:50px;}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .sheet-actions{display:flex; gap:10px; margin-top:16px;}
  .sheet-actions button{
    flex:1; padding:13px; border-radius:9px; font-weight:600; font-size:15px;
    border:1px solid var(--line-bright); background:var(--panel-raised); color:var(--text); cursor:pointer;
  }
  .sheet-actions button.save{background:var(--amber); color:#1a1408; border-color:var(--amber);}
  .sheet-actions button.danger{background:transparent; color:var(--red); border-color:var(--red-dim);}

  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--panel-raised); border:1px solid var(--line-bright); color:var(--text);
    padding:10px 18px; border-radius:8px; font-size:13px; opacity:0; transition:all 0.25s;
    z-index:200; pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">SURYA CONTROL<span>పని ప్రయారిటీ</span></div>
    <div style="display:flex; align-items:center; gap:10px;">
      <button id="exportBtn" class="header-icon-btn" title="డేటా బ్యాకప్ సేవ్ చేయండి">⭳ బ్యాకప్</button>
      <button id="importBtn" class="header-icon-btn" title="బ్యాకప్ నుండి తీసుకోండి">⭱ రీస్టోర్</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
      <div class="signal" id="syncStatus"><div class="signal-dot" id="syncDot"></div> <span id="syncText">కనెక్ట్ అవుతోంది...</span></div>
    </div>
  </div>
</header>

<main>
  <div class="hero" id="hero"></div>

  <div class="add-bar">
    <button class="primary" id="addTaskBtn">+ కొత్త పని</button>
    <button id="addResourceBtn">+ కొత్త Resource</button>
  </div>

  <div class="filters" id="filters"></div>

  <div class="sort-bar" id="sortBar">
    <span class="sort-bar-label">SORT:</span>
  </div>

  <div id="board"></div>
</main>

<div class="overlay" id="taskOverlay">
  <div class="sheet">
    <h3 id="taskFormTitle">కొత్త పని</h3>
    <input type="hidden" id="editTaskId">
    <div class="field">
      <label>పని ఏమిటి?</label>
      <textarea id="taskTitle" placeholder="ఉ. Phoenix portal #SearchText fix చేయడం"></textarea>
    </div>
    <div class="row2">
      <div class="field">
        <label>Resource</label>
        <select id="taskResource"></select>
      </div>
      <div class="field">
        <label>S/N (సీరియల్ నెంబర్)</label>
        <input type="number" id="taskSerial" placeholder="ఉ. 1, 2, 3...">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Revenue Impact</label>
        <select id="taskRevenue">
          <option value="high">High — తక్షణ ఆదాయం</option>
          <option value="medium">Medium</option>
          <option value="low">Low — ఆదాయం పైన తక్కువ ప్రభావం</option>
        </select>
      </div>
      <div class="field">
        <label>₹ అంచనా (optional)</label>
        <input type="number" id="taskAmount" placeholder="ఉ. 5000">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>ఎవరికి అప్పగించాలి?</label>
        <select id="taskAssignee"></select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="taskStatus">
          <option value="pending">Pending</option>
          <option value="progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>గమనిక / Deadline (optional)</label>
      <input type="text" id="taskNote" placeholder="ఉ. ఈ వారం లోపు">
    </div>
    <div class="sheet-actions">
      <button id="cancelTaskBtn">రద్దు</button>
      <button class="save" id="saveTaskBtn">సేవ్ చేయి</button>
    </div>
    <div class="sheet-actions" id="deleteRow" style="display:none;">
      <button class="danger" id="deleteTaskBtn">పని తీసివేయి</button>
    </div>
  </div>
</div>

<div class="overlay" id="resourceOverlay">
  <div class="sheet">
    <h3>కొత్త Resource జతచేయండి</h3>
    <div class="field">
      <label>Resource పేరు</label>
      <input type="text" id="resourceName" placeholder="ఉ. Surya DTH, MeeSeva, MT5 Trading...">
    </div>
    <div class="field">
      <label>రంగు (గుర్తింపు కోసం)</label>
      <select id="resourceColor">
        <option value="#f5a623">అంబర్</option>
        <option value="#5fbf7a">ఆకుపచ్చ</option>
        <option value="#5b9bd5">నీలం</option>
        <option value="#c75fbf">పర్పుల్</option>
        <option value="#e2584f">ఎరుపు</option>
        <option value="#9fae9b">బూడిద</option>
      </select>
    </div>
    <div class="field">
      <label class="checkbox-label"><input type="checkbox" id="resourcePinned">దీన్ని టాప్ ప్రయారిటీగా పిన్ చేయాలా? (📌 ఎప్పుడూ ముందు చూపిస్తుంది)</label>
    </div>
    <div class="sheet-actions">
      <button id="cancelResourceBtn">రద్దు</button>
      <button class="save" id="saveResourceBtn">జతచేయి</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">

    getFirestore, doc, setDoc, onSnapshot

    { id: 'seed11', serial: 11, title: 'కస్టమర్‌కి రీఛార్జ్ చేయడం', resourceId: 'r1', revenue: 'high', amount: null, assignee: 'నేను', status: 'pending', note: '', createdAt: Date.now() },
    { id: 'seed12', serial: 12, title: 'మార్కెటింగ్ చేయడం', resourceId: 'r1', revenue: 'medium', amount: null, assignee: 'నేను', status: 'pending', note: '', createdAt: Date.now() },
    { id: 'seed13', serial: 13, title: 'కస్టమర్ ఫోన్ కాల్స్ మాట్లాడడం', resourceId: 'r1', revenue: 'medium', amount: null, assignee: 'నేను', status: 'pending', note: '', createdAt: Date.now() }
  ]
});

function loadCachedState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if(!parsed.resources || !parsed.tasks) return defaultState();
    return parsed;
  }catch(e){ return defaultState(); }
}

let state = loadCachedState();
let isRemoteUpdate = false; // guards against re-writing what we just received
let saveTimer = null;

function setSyncStatus(mode){
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if(!dot || !text) return;
  dot.className = 'signal-dot';
  if(mode === 'live'){ text.textContent = 'LIVE'; }
  else if(mode === 'syncing'){ dot.classList.add('syncing'); text.textContent = 'సింక్ అవుతోంది...'; }
  else if(mode === 'offline'){ dot.classList.add('offline'); text.textContent = 'ఆఫ్‌లైన్ (లోకల్)'; }
}

function saveState(){
  // Always cache locally first so nothing is lost if offline
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(isRemoteUpdate) return; // don't echo back a remote-triggered render
  if(!window.__fb){ setSyncStatus('offline'); return; }
  setSyncStatus('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    window.__fb.setDoc(window.__fb.docRef, state)
      .then(()=> setSyncStatus('live'))
      .catch(()=> setSyncStatus('offline'));
  }, 400); // debounce rapid edits
}

function initFirebaseSync(){
  if(!window.__fb){ setSyncStatus('offline'); return; }
  setSyncStatus('syncing');
  window.__fb.onSnapshot(window.__fb.docRef, (snap)=>{
    if(snap.exists()){
      const remote = snap.data();
      if(remote && remote.resources && remote.tasks){
        isRemoteUpdate = true;
        state = remote;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render();
        isRemoteUpdate = false;
      }
    } else {
      // No cloud doc yet — push our current (cached/default) state to create it
      window.__fb.setDoc(window.__fb.docRef, state).catch(()=>{});
    }
    setSyncStatus('live');
  }, (err)=>{
    console.error('Firestore sync error', err);
    setSyncStatus('offline');
  });
}

if(window.__fb){
  initFirebaseSync();
} else {
  window.addEventListener('fb-ready', initFirebaseSync, { once: true });
  setTimeout(()=>{ if(!window.__fb) setSyncStatus('offline'); }, 4000);
}
let activeFilter = 'all'; // 'all' or resource id
let sortMode = 'priority'; // priority | amount_desc | amount_asc | serial
let collapsedGroups = {};

const revenueRank = { high: 3, medium: 2, low: 1 };
const revenueLabel = { high: 'High ₹', medium: 'Med ₹', low: 'Low ₹' };
const statusLabel = { pending: 'Pending', progress: 'In Progress', done: 'Done' };

function uid(){ return 't' + Math.random().toString(36).slice(2,10); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function getResource(id){ return state.resources.find(r=>r.id===id); }

function nextSerialSuggestion(){
  const max = state.tasks.reduce((m,t)=>Math.max(m, Number(t.serial)||0), 0);
  return max + 1;
}

function sortedActiveTasks(){
  return state.tasks
    .filter(t=>t.status!=='done')
    .sort((a,b)=>{
      const resA = getResource(a.resourceId);
      const resB = getResource(b.resourceId);
      const pinDiff = (resB && resB.pinned ? 1 : 0) - (resA && resA.pinned ? 1 : 0);
      if(pinDiff !== 0) return pinDiff;
      const rdiff = revenueRank[b.revenue] - revenueRank[a.revenue];
      if(rdiff !== 0) return rdiff;
      return (b.amount||0) - (a.amount||0);
    });
}

function renderHero(){
  const hero = document.getElementById('hero');
  const top = sortedActiveTasks()[0];
  if(!top){
    hero.innerHTML = `<span class="hero-label">ఇప్పుడు ఏం చేయాలి?</span><div class="hero-empty">అన్ని పనులు పూర్తయ్యాయి 🎉 — కొత్త పని జతచేయండి.</div>`;
    return;
  }
  const res = getResource(top.resourceId);
  const pinTag = res && res.pinned ? `<span class="tag" style="color:var(--amber); border-color:var(--amber-dim);">📌 టాప్ ప్రయారిటీ</span>` : '';
  hero.innerHTML = `
    <span class="hero-label">ఇప్పుడు ఏం చేయాలి →</span>
    <p class="hero-task">${escapeHtml(top.title)}</p>
    <div class="hero-meta">
      <span><b>${res ? escapeHtml(res.name) : '—'}</b></span>
      <span>${revenueLabel[top.revenue]}${top.amount ? ' · ₹'+top.amount : ''}</span>
      <span>👤 <b>${escapeHtml(top.assignee||'నేను')}</b></span>
      ${pinTag}
    </div>
  `;
}

function renderFilters(){
  const wrap = document.getElementById('filters');
  let html = `<button class="chip ${activeFilter==='all'?'active':''}" data-filter="all">అన్నీ</button>`;
  state.resources.forEach(r=>{
    html += `<button class="chip ${activeFilter===r.id?'active':''}" data-filter="${r.id}">${escapeHtml(r.name)}</button>`;
  });
  wrap.innerHTML = html;
  wrap.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{ activeFilter = btn.dataset.filter; render(); });
  });
}

function renderSortBar(){
  const wrap = document.getElementById('sortBar');
  const options = [
    { id: 'priority', label: '⚡ ప్రయారిటీ' },
    { id: 'amount_desc', label: '₹ ఎక్కువ → తక్కువ' },
    { id: 'amount_asc', label: '₹ తక్కువ → ఎక్కువ' },
    { id: 'serial', label: '# S/N ఆర్డర్' }
  ];
  let html = `<span class="sort-bar-label">SORT:</span>`;
  options.forEach(o=>{
    html += `<button class="sort-chip ${sortMode===o.id?'active':''}" data-sort="${o.id}">${o.label}</button>`;
  });
  wrap.innerHTML = html;
  wrap.querySelectorAll('.sort-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{ sortMode = btn.dataset.sort; render(); });
  });
}

function priorityBarClass(t){
  if(t.revenue==='high') return 'pbar-high';
  if(t.revenue==='medium') return 'pbar-med';
  return 'pbar-low';
}

function renderBoard(){
  const board = document.getElementById('board');
  const resources = activeFilter==='all' ? state.resources : state.resources.filter(r=>r.id===activeFilter);

  if(state.tasks.length===0){
    board.innerHTML = `<div class="empty-state"><div class="big">📋</div>ఇంకా పనులు లేవు.<br>"+ కొత్త పని" నొక్కి మొదలుపెట్టండి.</div>`;
    return;
  }

  function compareTasks(a,b){
    // done tasks always sink to bottom regardless of sort mode
    if(a.status==='done' && b.status!=='done') return 1;
    if(b.status==='done' && a.status!=='done') return -1;

    if(sortMode==='amount_desc') return (b.amount||0)-(a.amount||0);
    if(sortMode==='amount_asc') return (a.amount||0)-(b.amount||0);
    if(sortMode==='serial') return (Number(a.serial)||9999)-(Number(b.serial)||9999);
    // default: priority (revenue tier)
    return revenueRank[b.revenue]-revenueRank[a.revenue];
  }

  let html = '';
  resources.forEach(res=>{
    const tasks = state.tasks
      .filter(t=>t.resourceId===res.id)
      .sort(compareTasks);
    if(tasks.length===0) return;

    const pendingSum = tasks.filter(t=>t.status!=='done' && t.amount).reduce((s,t)=>s+Number(t.amount||0),0);
    const collapsed = collapsedGroups[res.id];

    html += `<div class="resource-group">
      <div class="resource-head" data-toggle="${res.id}">
        <div class="resource-name"><span class="resource-dot" style="background:${res.color}"></span>${escapeHtml(res.name)}${res.pinned?' <span style="color:var(--amber); font-size:13px;">📌</span>':''} <span style="color:var(--text-faint); font-size:14px;">${collapsed?'▸':'▾'}</span></div>
        <div style="display:flex; gap:10px; align-items:center;">
          ${pendingSum>0?`<span class="resource-sum">₹${pendingSum.toLocaleString('en-IN')}</span>`:''}
          <span class="resource-count">${tasks.filter(t=>t.status!=='done').length} pending</span>
        </div>
      </div>
      <div class="task-list" style="${collapsed?'display:none;':''}">
        ${tasks.map(t=>taskCardHtml(t)).join('')}
      </div>
    </div>`;
  });

  board.innerHTML = html || `<div class="empty-state"><div class="big">🔍</div>ఈ Resource లో పనులు లేవు.</div>`;

  board.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.toggle;
      collapsedGroups[id] = !collapsedGroups[id];
      renderBoard();
    });
  });
  board.querySelectorAll('.task-card').forEach(card=>{
    const id = card.dataset.id;
    card.querySelector('.edit-btn').addEventListener('click', (e)=>{ e.stopPropagation(); openTaskForm(id); });
    card.querySelector('.cycle-btn').addEventListener('click', (e)=>{ e.stopPropagation(); cycleStatus(id); });
  });
}

function taskCardHtml(t){
  const statusClass = t.status==='done' ? 'status-done' : (t.status==='progress' ? 'status-progress' : 'status-pending');
  const statusIcon = t.status==='done' ? '✓' : (t.status==='progress' ? '◐' : '○');
  return `<div class="task-card ${t.status==='done'?'done':''}" data-id="${t.id}">
    <span class="task-serial">#${t.serial!=null && t.serial!=='' ? t.serial : '—'}</span>
    <div class="priority-bar ${priorityBarClass(t)}"></div>
    <div class="task-body">
      <p class="task-title">${escapeHtml(t.title)}</p>
      <div class="task-tags">
        <span class="tag rev">${revenueLabel[t.revenue]}${t.amount?' · ₹'+Number(t.amount).toLocaleString('en-IN'):''}</span>
        <span class="tag who">👤 ${escapeHtml(t.assignee||'నేను')}</span>
        <span class="tag ${statusClass}">${statusIcon} ${statusLabel[t.status]}</span>
        ${t.note ? `<span class="tag who">🕒 ${escapeHtml(t.note)}</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="icon-btn cycle-btn" title="Status మార్చండి">${statusIcon}</button>
      <button class="icon-btn edit-btn" title="మార్చండి">✎</button>
    </div>
  </div>`;
}

function cycleStatus(id){
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  t.status = t.status==='pending' ? 'progress' : (t.status==='progress' ? 'done' : 'pending');
  saveState();
  render();
  showToast('Status: ' + statusLabel[t.status]);
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function populateSelects(){
  const resSel = document.getElementById('taskResource');
  resSel.innerHTML = state.resources.map(r=>`<option value="${r.id}">${escapeHtml(r.name)}</option>`).join('');
  const asgSel = document.getElementById('taskAssignee');
  asgSel.innerHTML = state.assignees.map(a=>`<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
}

function openTaskForm(id){
  populateSelects();
  document.getElementById('deleteRow').style.display = id ? 'flex' : 'none';
  if(id){
    const t = state.tasks.find(x=>x.id===id);
    document.getElementById('taskFormTitle').textContent = 'పని మార్చండి';
    document.getElementById('editTaskId').value = id;
    document.getElementById('taskTitle').value = t.title;
    document.getElementById('taskResource').value = t.resourceId;
    document.getElementById('taskSerial').value = t.serial!=null ? t.serial : '';
    document.getElementById('taskRevenue').value = t.revenue;
    document.getElementById('taskAmount').value = t.amount || '';
    document.getElementById('taskAssignee').value = t.assignee || 'నేను';
    document.getElementById('taskStatus').value = t.status;
    document.getElementById('taskNote').value = t.note || '';
  } else {
    document.getElementById('taskFormTitle').textContent = 'కొత్త పని';
    document.getElementById('editTaskId').value = '';
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskSerial').value = nextSerialSuggestion();
    document.getElementById('taskRevenue').value = 'medium';
    document.getElementById('taskAmount').value = '';
    document.getElementById('taskAssignee').value = 'నేను';
    document.getElementById('taskStatus').value = 'pending';
    document.getElementById('taskNote').value = '';
    if(activeFilter !== 'all') document.getElementById('taskResource').value = activeFilter;
  }
  document.getElementById('taskOverlay').classList.add('open');
}
function closeTaskForm(){ document.getElementById('taskOverlay').classList.remove('open'); }

function saveTask(){
  const title = document.getElementById('taskTitle').value.trim();
  if(!title){ showToast('పని పేరు రాయండి'); return; }
  const id = document.getElementById('editTaskId').value;
  const serialVal = document.getElementById('taskSerial').value;
  const data = {
    title,
    resourceId: document.getElementById('taskResource').value,
    serial: serialVal !== '' ? Number(serialVal) : null,
    revenue: document.getElementById('taskRevenue').value,
    amount: document.getElementById('taskAmount').value ? Number(document.getElementById('taskAmount').value) : null,
    assignee: document.getElementById('taskAssignee').value,
    status: document.getElementById('taskStatus').value,
    note: document.getElementById('taskNote').value.trim()
  };
  if(id){
    const t = state.tasks.find(x=>x.id===id);
    Object.assign(t, data);
    showToast('పని అప్‌డేట్ అయింది');
  } else {
    state.tasks.push({ id: uid(), ...data, createdAt: Date.now() });
    showToast('కొత్త పని జతచేయబడింది');
  }
  saveState();
  closeTaskForm();
  render();
}

function deleteTask(){
  const id = document.getElementById('editTaskId').value;
  state.tasks = state.tasks.filter(t=>t.id!==id);
  saveState();
  closeTaskForm();
  render();
  showToast('పని తీసివేయబడింది');
}

function openResourceForm(){ document.getElementById('resourceOverlay').classList.add('open'); }
function closeResourceForm(){
  document.getElementById('resourceOverlay').classList.remove('open');
  document.getElementById('resourceName').value = '';
  document.getElementById('resourcePinned').checked = false;
}
function saveResource(){
  const name = document.getElementById('resourceName').value.trim();
  if(!name){ showToast('Resource పేరు రాయండి'); return; }
  const color = document.getElementById('resourceColor').value;
  const pinned = document.getElementById('resourcePinned').checked;
  if(pinned){ state.resources.forEach(r=>r.pinned=false); }
  state.resources.push({ id: uid(), name, color, pinned });
  saveState();
  closeResourceForm();
  render();
  showToast('Resource జతచేయబడింది');
}

function render(){
  renderHero();
  renderFilters();
  renderSortBar();
  renderBoard();
}

function exportData(){
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `surya-control-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('బ్యాకప్ ఫైల్ డౌన్‌లోడ్ అయింది');
}

function importData(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed.resources || !parsed.tasks){ showToast('ఇది సరైన బ్యాకప్ ఫైల్ కాదు'); return; }
      state = parsed;
      saveState();
      render();
      showToast('డేటా రీస్టోర్ అయింది');
    }catch(err){
      showToast('ఫైల్ చదవడంలో సమస్య వచ్చింది');
    }
  };
  reader.readAsText(file);
}

document.getElementById('addTaskBtn').addEventListener('click', ()=>openTaskForm(null));
document.getElementById('addResourceBtn').addEventListener('click', openResourceForm);
document.getElementById('cancelTaskBtn').addEventListener('click', closeTaskForm);
document.getElementById('saveTaskBtn').addEventListener('click', saveTask);
document.getElementById('deleteTaskBtn').addEventListener('click', deleteTask);
document.getElementById('cancelResourceBtn').addEventListener('click', closeResourceForm);
document.getElementById('saveResourceBtn').addEventListener('click', saveResource);
document.getElementById('taskOverlay').addEventListener('click', (e)=>{ if(e.target.id==='taskOverlay') closeTaskForm(); });
document.getElementById('resourceOverlay').addEventListener('click', (e)=>{ if(e.target.id==='resourceOverlay') closeResourceForm(); });
document.getElementById('exportBtn').addEventListener('click', exportData);
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) importData(file);
  e.target.value = '';
});

render();
</script>
